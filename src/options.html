<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>primedl Options</title>
		<!-- FOUC prevention for options page too -->
		<script>try{document.documentElement.dataset.theme=localStorage.getItem("pd-theme")||"default"}catch(e){}</script>
		<link rel="stylesheet" href="css/tokens.css" />
		<link rel="stylesheet" href="css/themes/terminal.css" />
		<link rel="stylesheet" href="css/themes/clean-card.css" />
		<link rel="stylesheet" href="css/themes/compact.css" />
		<link rel="stylesheet" href="css/themes/dashboard.css" />
		<link rel="stylesheet" href="css/themes/brutalist.css" />
		<link rel="stylesheet" href="css/options.css" />
		<link rel="icon" href="favicon.ico" />
	</head>
	<body>
		<table id="options">
			<tbody>

				<!-- ── Detection ─────────────────────────────────────────── -->
				<tr>
					<td><label for="disablePref"></label></td>
					<td>
						<input class="option" id="disablePref" type="checkbox" />
					</td>
				</tr>
				<tr>
					<td><label for="subtitlePref"></label></td>
					<td>
						<input class="option" id="subtitlePref" type="checkbox" />
					</td>
				</tr>
				<tr>
					<td><label for="filePref"></label></td>
					<td>
						<input class="option" id="filePref" type="checkbox" />
					</td>
				</tr>
				<tr>
					<td><label for="manifestPref"></label></td>
					<td>
						<input class="option" id="manifestPref" type="checkbox" />
						<div class="tipContainer">
							<span class="tip" id="manifestTip">?</span>
						</div>
					</td>
				</tr>
				<tr>
					<td><label for="downloadDirectPref"></label></td>
					<td>
						<input class="option" id="downloadDirectPref" type="checkbox" />
					</td>
				</tr>
				<tr>
					<td><label for="autoDownloadPref"></label></td>
					<td>
						<input class="option" id="autoDownloadPref" type="checkbox" />
						<div class="tipContainer">
							<span class="tip" id="autoDownloadTip">?</span>
						</div>
					</td>
				</tr>
				<tr>
					<td><label for="fileSizePref"></label></td>
					<td>
						<input class="option" id="fileSizePref" type="checkbox" />
						<div style="display: inline">
							<input
								class="option"
								id="fileSizeAmount"
								type="number"
								min="1"
								value="1"
							/>
							MB
						</div>
					</td>
				</tr>

				<!-- ── Custom detection ───────────────────────────────────── -->
				<tr>
					<td><label for="customExtPref"></label></td>
					<td>
						<input class="option" id="customExtPref" type="checkbox" />
						<div class="tipContainer">
							<span class="tip" id="customExtTip">?</span>
						</div>
						<div>
							<textarea class="option" id="customExtEntries" rows="3"></textarea>
						</div>
					</td>
				</tr>
				<tr>
					<td><label for="customCtPref"></label></td>
					<td>
						<input class="option" id="customCtPref" type="checkbox" />
						<div class="tipContainer">
							<span class="tip" id="customCtTip">?</span>
						</div>
						<div>
							<textarea class="option" id="customCtEntries" rows="3"></textarea>
						</div>
					</td>
				</tr>

				<!-- ── Blacklist ──────────────────────────────────────────── -->
				<tr>
					<td><label for="blacklistPref"></label></td>
					<td>
						<input class="option" id="blacklistPref" type="checkbox" />
						<div class="tipContainer">
							<span class="tip" id="blacklistTip">?</span>
						</div>
						<div>
							<textarea class="option" id="blacklistEntries" rows="3"></textarea>
						</div>
					</td>
				</tr>

				<!-- ── Headers ────────────────────────────────────────────── -->
				<tr>
					<td><label for="headersPref"></label></td>
					<td>
						<input class="option" id="headersPref" type="checkbox" />
					</td>
				</tr>
				<tr>
					<td><label for="titlePref"></label></td>
					<td>
						<input class="option" id="titlePref" type="checkbox" />
					</td>
				</tr>
				<tr>
					<td><label for="filenamePref"></label></td>
					<td>
						<input class="option" id="filenamePref" type="checkbox" />
					</td>
				</tr>
				<tr>
					<td><label for="timestampPref"></label></td>
					<td>
						<input class="option" id="timestampPref" type="checkbox" />
					</td>
				</tr>
				<tr>
					<td><label for="fileExtension"></label></td>
					<td>
						<input
							class="option"
							id="fileExtension"
							type="text"
							placeholder="ts"
						/>
					</td>
				</tr>

				<!-- ── Copy method ────────────────────────────────────────── -->
				<tr>
					<td><label for="copyMethod"></label></td>
					<td>
						<select class="option" id="copyMethod">
							<option value="url"></option>
							<option value="kodiUrl"></option>
							<option value="tableForm"></option>
							<option value="ytdlp"></option>
							<option value="ffmpeg"></option>
							<option value="streamlink"></option>
							<option value="hlsdl"></option>
							<option value="nm3u8dl"></option>
							<option value="user1"></option>
							<option value="user2"></option>
							<option value="user3"></option>
						</select>
					</td>
				</tr>
				<tr>
					<td><label for="customCommandPref"></label></td>
					<td>
						<input class="option" id="customCommandPref" type="checkbox" />
						<div style="display: inline">
							<input
								class="option"
								id="customCommand"
								type="text"
								placeholder="--verbose"
							/>
						</div>
					</td>
				</tr>
				<tr>
					<td><label for="userCommand"></label></td>
					<td>
						<input
							class="option"
							id="userCommand1"
							type="text"
							placeholder="usercmd %url%"
						/>
						<div class="tipContainer">
							<span class="tip" id="userCommandTip">?</span>
						</div>
					</td>
				</tr>
				<tr>
					<td></td>
					<td>
						<input
							class="option"
							id="userCommand2"
							type="text"
							placeholder="usercmd %url%"
						/>
					</td>
				</tr>
				<tr>
					<td></td>
					<td>
						<input
							class="option"
							id="userCommand3"
							type="text"
							placeholder="usercmd %url%"
						/>
					</td>
				</tr>
				<tr>
					<td><label for="regexCommandPref"></label></td>
					<td>
						<input class="option" id="regexCommandPref" type="checkbox" />
						&#47;&nbsp;<input
							class="option"
							id="regexCommand"
							type="text"
							placeholder="pattern"
						/>&nbsp;&#47;
						<div class="tipContainer">
							<span class="warning" id="regexWarning">!</span>
						</div>
					</td>
				</tr>
				<tr>
					<td></td>
					<td>
						<input
							class="option"
							id="regexReplace"
							type="text"
							placeholder="replacement"
						/>
					</td>
				</tr>

				<!-- ── Tool-specific ─────────────────────────────────────── -->
				<tr>
					<td><label for="streamlinkOutput"></label></td>
					<td>
						<select class="option" id="streamlinkOutput">
							<option value="file"></option>
							<option value="player"></option>
						</select>
					</td>
				</tr>
				<tr>
					<td><label for="downloaderPref"></label></td>
					<td>
						<input class="option" id="downloaderPref" type="checkbox" />
						<div style="display: inline">
							<input
								class="option"
								id="downloaderCommand"
								type="text"
								placeholder="aria2c"
							/>
						</div>
					</td>
				</tr>
				<tr>
					<td><label for="multithreadPref"></label></td>
					<td>
						<input class="option" id="multithreadPref" type="checkbox" />
						<div style="display: inline">
							<input
								class="option"
								id="multithreadAmount"
								type="number"
								min="2"
								max="16"
								value="4"
							/>
						</div>
					</td>
				</tr>
				<tr>
					<td><label for="proxyPref"></label></td>
					<td>
						<input class="option" id="proxyPref" type="checkbox" />
						<div style="display: inline">
							<input
								class="option"
								id="proxyCommand"
								type="text"
								placeholder="socks5://127.0.0.1:1080"
							/>
						</div>
					</td>
				</tr>

				<!-- ── Session ────────────────────────────────────────────── -->
				<tr>
					<td><label for="noRestorePref"></label></td>
					<td>
						<input class="option" id="noRestorePref" type="checkbox" />
					</td>
				</tr>
				<tr>
					<td><label for="recentPref"></label></td>
					<td>
						<input class="option" id="recentPref" type="checkbox" />
						<div style="display: inline">
							<input
								class="option"
								id="recentAmount"
								type="number"
								min="1"
								value="5"
							/>
						</div>
					</td>
				</tr>

				<!-- ── Notifications ─────────────────────────────────────── -->
				<tr>
					<td><label for="notifDetectPref"></label></td>
					<td>
						<input class="option" id="notifDetectPref" type="checkbox" />
					</td>
				</tr>
				<tr>
					<td><label for="notifPref"></label></td>
					<td>
						<input class="option" id="notifPref" type="checkbox" />
					</td>
				</tr>

				<!-- ── primedl Relay ──────────────────────────────────────── -->
				<tr>
					<td><label for="primedlRelayEnabled">primedl relay:</label></td>
					<td>
						<input class="option" id="primedlRelayEnabled" type="checkbox" />
					</td>
				</tr>
				<tr>
					<td><label for="primedlRelayPort">Relay port:</label></td>
					<td>
						<input
							class="option"
							id="primedlRelayPort"
							type="number"
							min="1024"
							max="65535"
							value="7421"
						/>
					</td>
				</tr>

				<!-- ── UI Theme ───────────────────────────────────────────── -->
				<!--
				  uiTheme is a class="option" element so saveOptionStorage saves it on change.
				  theme.js listens via chrome.storage.onChanged and applies live.
				  uiThemeTip span wires the i18n tooltip key that was previously unreachable.
				-->
				<tr>
					<td><label for="uiTheme"></label></td>
					<td>
						<select class="option" id="uiTheme">
							<option value="default" data-i18n-opt="themeDefault"></option>
							<option value="terminal" data-i18n-opt="themeTerminal"></option>
							<option value="clean-card" data-i18n-opt="themeCleanCard"></option>
							<option value="compact" data-i18n-opt="themeCompact"></option>
							<option value="dashboard" data-i18n-opt="themeDashboard"></option>
							<option value="brutalist" data-i18n-opt="themeBrutalist"></option>
						</select>
						<div class="tipContainer">
							<span class="tip" id="uiThemeTip">?</span>
						</div>
					</td>
				</tr>

				<!-- ── Export / Import / Reset ───────────────────────────── -->
				<tr>
					<td><label for="exportSettings"></label></td>
					<td>
						<button class="option" id="exportButton" type="button"></button>
						<button class="option" id="importButton" type="button"></button>
					</td>
				</tr>
				<tr>
					<td><label for="resetButtonLabel"></label></td>
					<td>
						<button class="option" id="resetButton" type="button"></button>
					</td>
				</tr>

				<!-- Version tag -->
				<tr>
					<td id="versionContainer"><label for="versionTag"></label></td>
				</tr>

			</tbody>
		</table>

		<script type="module" src="js/options.js"></script>
	</body>
</html>
