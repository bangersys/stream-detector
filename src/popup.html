<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>primedl</title>
		<link rel="stylesheet" href="css/popup.css" />
		<link rel="icon" href="favicon.ico" />
	</head>
	<body id="popup">
		<div id="container">

			<!-- Tab selector: current tab / session / previous -->
			<table>
				<tbody>
					<tr>
						<td>
							<input class="option" type="radio" id="tabThis" name="tab" />
							<label for="tabThis"></label>
						</td>
						<td>
							<input class="option" type="radio" id="tabAll" name="tab" />
							<label for="tabAll"></label>
						</td>
						<td>
							<input class="option" type="radio" id="tabPrevious" name="tab" />
							<label for="tabPrevious"></label>
						</td>
					</tr>
				</tbody>
			</table>

			<!-- Filter + copy method selector -->
			<table>
				<tbody>
					<tr>
						<td>
							<label for="filterInput"></label>
							<input class="option" type="text" id="filterInput" />
							<a id="clearFilterInput" role="button" tabindex="0">✖</a>
						</td>
						<td>
							<label for="copyMethod"></label>
							<select class="option" id="copyMethod">
								<option value="url"></option>
								<option value="kodiUrl"></option>
								<option value="tableForm"></option>
								<option value="ytdlp"></option>
								<option value="ffmpeg"></option>
								<option value="streamlink"></option>
								<option value="hlsdl"></option>
								<option value="nm3u8dl"></option>
								<option value="user1"></option>
								<option value="user2"></option>
								<option value="user3"></option>
							</select>
						</td>
					</tr>
				</tbody>
			</table>

			<!-- URL list table -->
			<div id="urlList">
				<table>
					<colgroup>
						<col style="width: 9%" />
						<col style="width: 29%" />
						<col style="width: 12%" />
						<col style="width: 25%" />
						<col style="width: 20%" />
						<col style="width: 5%" />
					</colgroup>
					<thead id="headers">
						<tr>
							<th><label for="popupType"></label></th>
							<th><label for="popupFilename"></label></th>
							<th><label for="popupSize"></label></th>
							<th><label for="popupSource"></label></th>
							<th><label for="popupTimestamp"></label></th>
							<th>✖</th>
						</tr>
					</thead>
					<tbody id="popupUrlList"></tbody>
				</table>
			</div>

			<!-- Bottom action bar -->
			<table>
				<tbody>
					<tr>
						<td>
							<input class="option" id="disablePref" type="checkbox" />
							<label for="disablePref"></label>
						</td>
						<td>
							<button id="copyAll"><label for="copyAll"></label></button>
						</td>
						<td>
							<button id="clearList"><label for="clearList"></label></button>
						</td>
						<td>
							<button id="openOptions"><label for="openOptions"></label></button>
						</td>
					</tr>
				</tbody>
			</table>

			<!-- primedl relay status indicator -->
			<div id="primedlStatusBar">
				<span id="primedlStatus" class="relay-disconnected">○ primedl offline</span>
			</div>

		</div>

		<script type="module" src="js/popup.js"></script>
	</body>
</html>
