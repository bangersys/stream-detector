<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>primedl</title>
		<!--
		  FOUC prevention — loads fouc.js as a static external script.
		  Chrome MV3 CSP blocks ALL inline <script> tags (no unsafe-inline).
		  fouc.js is a plain synchronous script (no defer/async/module) so it
		  executes immediately, setting data-theme on <html> before CSS paints.
		-->
		<script src="fouc.js"></script>
		<!-- 1. Token layer (defines all --pd-* custom properties) -->
		<link rel="stylesheet" href="css/tokens.css" />
		<!-- 2. Theme overrides (each file scoped to [data-theme="X"]) -->
		<link rel="stylesheet" href="css/themes/terminal.css" />
		<link rel="stylesheet" href="css/themes/clean-card.css" />
		<link rel="stylesheet" href="css/themes/compact.css" />
		<link rel="stylesheet" href="css/themes/dashboard.css" />
		<link rel="stylesheet" href="css/themes/brutalist.css" />
		<!-- 3. Structural styles (uses var(--pd-*) only, no hardcoded colors) -->
		<link rel="stylesheet" href="css/popup.css" />
		<link rel="icon" href="favicon.ico" />
	</head>
	<body id="popup">
		<div id="container">

			<!-- Tab selector: current tab / session / previous -->
			<div class="tab-row">
				<label class="tab-label">
					<input class="option" type="radio" id="tabThis" name="tab" checked />
					<span data-i18n="tabThis"></span>
				</label>
				<label class="tab-label">
					<input class="option" type="radio" id="tabAll" name="tab" />
					<span data-i18n="tabAll"></span>
				</label>
				<label class="tab-label">
					<input class="option" type="radio" id="tabPrevious" name="tab" />
					<span data-i18n="tabPrevious"></span>
				</label>
			</div>

			<!-- Filter + copy method -->
			<div class="toolbar-row">
				<div class="filter-group">
					<input class="option" type="text" id="filterInput" />
					<button type="button" id="clearFilterInput" aria-label="Clear filter">✖</button>
				</div>
				<div class="method-group">
					<select class="option" id="copyMethod" aria-label="Copy method">
						<option value="url"></option>
						<option value="kodiUrl"></option>
						<option value="tableForm"></option>
						<option value="ytdlp"></option>
						<option value="ffmpeg"></option>
						<option value="streamlink"></option>
						<option value="hlsdl"></option>
						<option value="nm3u8dl"></option>
						<option value="user1"></option>
						<option value="user2"></option>
						<option value="user3"></option>
					</select>
				</div>
			</div>

			<!-- URL list table -->
			<div id="urlList">
				<table>
					<colgroup>
						<col class="col-type" />
						<col class="col-filename" />
						<col class="col-size" />
						<col class="col-source" />
						<col class="col-timestamp" />
						<col class="col-del" />
					</colgroup>
					<thead id="headers">
						<tr>
							<th class="th-center"><label for="popupType"></label></th>
							<th class="th-left"><label for="popupFilename"></label></th>
							<th class="th-center"><label for="popupSize"></label></th>
							<th class="th-left"><label for="popupSource"></label></th>
							<th class="th-left"><label for="popupTimestamp"></label></th>
							<th class="th-center">✖</th>
						</tr>
					</thead>
					<tbody id="popupUrlList"></tbody>
				</table>
			</div>

			<!-- Bottom action bar -->
			<div class="action-bar">
				<label class="action-bar-check">
					<input class="option" id="disablePref" type="checkbox" />
					<span data-i18n="disablePref"></span>
				</label>
				<button type="button" id="copyAll"><label for="copyAll"></label></button>
				<button type="button" id="clearList"><label for="clearList"></label></button>
				<button type="button" id="openOptions"><label for="openOptions"></label></button>
			</div>

			<!-- primedl relay status indicator -->
			<div id="primedlStatusBar">
				<span id="primedlStatus" class="relay-disconnected">○ primedl offline</span>
			</div>

			<!-- ── Cookies section ─────────────────────────────────────────── -->
			<div id="cookieSection">
				<button type="button" id="cookieToggle" aria-expanded="false">
					<span id="cookieToggleIcon" aria-hidden="true">▶</span>
					<span class="cookie-section-title" data-i18n="cookieSection"></span>
					<span id="cookieCount" class="cookie-count"></span>
				</button>

				<div id="cookiePanel" hidden>
					<div class="cookie-controls">

						<div class="cookie-format-row">
							<label for="cookieFormat" data-i18n="cookieFormat"></label>
							<select id="cookieFormat">
								<option value="netscape"></option>
								<option value="json"></option>
								<option value="header"></option>
							</select>
						</div>

						<div class="cookie-btn-row">
							<button type="button" id="cookieExport">
								<label for="cookieExport"></label>
							</button>
							<button type="button" id="cookieExportAs">
								<label for="cookieExportAs"></label>
							</button>
							<button type="button" id="cookieCopy" class="cookie-copy-btn">
								<span class="copy-default" data-i18n="cookieCopy"></span>
								<span class="copy-done" data-i18n="cookieCopied" hidden></span>
							</button>
							<button type="button" id="cookieExportAll">
								<label for="cookieExportAll"></label>
							</button>
						</div>

					</div>
				</div>
			</div>

		</div>
		<script type="module" src="js/popup.js"></script>
	</body>
</html>
